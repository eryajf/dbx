services:
  dbx:
    # Docker Hub image. `latest` tracks the current release.
    image: t8y2/dbx:latest
    # For faster pulls in China, use the CNB image instead:
    # image: docker.cnb.cool/dbxio.com/dbx:latest
    ports:
      - "4224:4224"
    environment:
      - DBX_PASSWORD=changeme
      # Uncomment when publishing DBX under a reverse-proxy subpath, e.g. https://example.com/dbx/
      # - DBX_PUBLIC_BASE_PATH=/dbx
    volumes:
      - dbx-data:/app/data
    restart: unless-stopped

volumes:
  dbx-data:

services:
  dbx:
    container_name: dbx
    # Docker Hub image. Pin the version so deployments stay reproducible.
    image: t8y2/dbx:0.5.52
    # For faster pulls in China, use the CNB image instead:
    # image: docker.cnb.cool/dbxio.com/dbx:0.5.52
    ports:
      - "4224:4224"
    environment:
      - DBX_PASSWORD=changeme
      # Uncomment when publishing DBX under a reverse-proxy subpath, e.g. https://example.com/dbx/
      # - DBX_PUBLIC_BASE_PATH=/dbx
    volumes:
      - ./data:/app/data
    restart: unless-stopped
